name: hauk
base: core24
version: '1.6.2'
summary: Open-source realtime location sharing
description: |
  Hauk is a fully open source, self-hosted location sharing service.

grade: devel
confinement: strict

hooks:
  install:
    command-chain:
      - snap/command-chain/install.sh

parts:
  server:
    plugin: nil
    stage-packages:
      - nginx
      - memcached
      - php-fpm
      - php-memcached
      - php-ldap
  html:
    plugin: nil
    build-packages:
      - wget
      - tar
    override-build: |
      wget https://github.com/bilde2910/Hauk/archive/refs/tags/v$SNAPCRAFT_PROJECT_VERSION.tar.gz
      tar -xf v$SNAPCRAFT_PROJECT_VERSION.tar.gz
      mkdir html
      cp -a Hauk-$SNAPCRAFT_PROJECT_VERSION/frontend/. html/
      cp -a Hauk-$SNAPCRAFT_PROJECT_VERSION/backend-php/. html/
    override-prime: |
      craftctl default
      cp -r $CRAFT_PART_BUILD/html .
  local:
    after: [html]
    plugin: dump
    source-type: local
    source: snap/local
    override-prime: |
      craftctl default
      rm html/include/inc.php
      mv etc/inc.php html/include/inc.php

apps:
  nginx:
    command: bin/nginx.sh
    daemon: simple
    plugs: [network, network-bind]
  php-fpm:
    command: bin/php-fpm.sh
    daemon: simple
    plugs: [network, network-bind]
  memcached:
    command: bin/memcached.sh
    daemon: simple
    plugs: [network, network-bind]
